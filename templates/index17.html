<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .login-box{

            background: white;
            padding: 30px;
            border-radius: 10px;

            width: 300px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input{

            width: 100%;
            padding: 10px;

            margin-top: 10px;
            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{

            width: 100%;
            padding: 10px;

            background-color: #007bff;
            color: white;

            border: none;
            border-radius: 5px;

            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h2>Login</h2>

        <form action="/login" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
